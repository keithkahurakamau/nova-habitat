<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nova-Habitat mark">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c6e4b"/>
      <stop offset="1" stop-color="#0f4630"/>
    </linearGradient>
    <linearGradient id="leaf" x1="34" y1="22" x2="62" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#bfe7cf"/>
      <stop offset="1" stop-color="#5fbd8a"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect width="96" height="96" rx="24" fill="url(#tile)"/>

  <!-- leaf body -->
  <path d="M48 20c17 10 18 38 0 56-18-18-17-46 0-56z" fill="url(#leaf)"/>

  <!-- midrib + side veins (cream) -->
  <path d="M48 26c-3 14-4 28-6 42" stroke="#0f4630" stroke-width="2.4" stroke-linecap="round" opacity=".55"/>
  <path d="M46.8 40l8-5M46 50l9-6M45.2 60l8-5" stroke="#0f4630" stroke-width="2" stroke-linecap="round" opacity=".4"/>

  <!-- clay-brown stem -->
  <path d="M42 76c1.6-4 3.4-7 6-9" stroke="#b06a3c" stroke-width="3.4" stroke-linecap="round"/>

  <!-- nova spark at the tip -->
  <path d="M48 8l2.4 6.2L57 17l-6.6 2.4L48 26l-2.4-6.6L39 17l6.6-2.4L48 8z" fill="#e7b894"/>
</svg>
